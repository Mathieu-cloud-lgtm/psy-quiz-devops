<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Psy Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .floating-shape { position: absolute; background: rgba(255,255,255,0.03); border-radius: 50%; filter: blur(70px); z-index: 0; }
        .shape1 { width: 500px; height: 500px; top: -150px; right: -150px; background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, rgba(75,0,130,0.1) 100%); }
        .shape2 { width: 400px; height: 400px; bottom: -150px; left: -150px; background: radial-gradient(circle, rgba(255,105,180,0.15) 0%, rgba(255,20,147,0.05) 100%); }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
        }
        .admin-card {
            background: rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: transform 0.2s;
        }
        .admin-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
    </style>
    <script>
        window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
</head>
<body class="relative">
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <div class="relative z-10 max-w-5xl mx-auto px-4 py-8">
        <nav class="glass-card py-4 px-6 flex justify-between items-center mb-8">
            <span class="text-2xl font-light text-white">Psy<span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-pink-200">Quiz</span> <span class="text-sm text-white/50 ml-2">Admin</span></span>
            <div class="flex items-center space-x-3">
                <a href="/" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 transition">Accueil</a>
                <a href="/logout" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-red-500/20 hover:bg-red-500/30 transition">Déconnexion</a>
            </div>
        </nav>

        <div class="glass-card p-8">
            <h1 class="text-3xl font-bold text-white mb-2">👨‍⚕️ Administration</h1>
            <p class="text-gray-200 mb-8">Bienvenue, {{ username }}</p>
            <div class="grid md:grid-cols-2 gap-6">
                <a href="/admin/questions" class="admin-card block">
                    <h3 class="text-xl font-bold text-white mb-2">📝 Gestion des questions</h3>
                    <p class="text-gray-200">Ajouter, modifier ou supprimer des questions du quiz.</p>
                </a>
                <a href="/admin/patients" class="admin-card block">
                    <h3 class="text-xl font-bold text-white mb-2">👥 Gestion des patients</h3>
                    <p class="text-gray-200">Consulter les résultats et supprimer des patients.</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>

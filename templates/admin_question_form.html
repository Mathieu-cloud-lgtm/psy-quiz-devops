<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ "Éditer" if question else "Ajouter" }} une question - Psy Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .floating-shape { position: absolute; background: rgba(255,255,255,0.03); border-radius: 50%; filter: blur(70px); z-index: 0; }
        .shape1 { width: 500px; height: 500px; top: -150px; left: -150px; background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, rgba(75,0,130,0.1) 100%); }
        .shape2 { width: 400px; height: 400px; bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(255,105,180,0.15) 0%, rgba(255,20,147,0.05) 100%); }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
        }
        .input-field {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            width: 100%;
            outline: none;
        }
        .input-field:focus { border-color: #8a2be2; box-shadow: 0 0 0 3px rgba(138,43,226,0.3); }
        textarea.input-field { border-radius: 1.5rem; resize: vertical; }
        .btn-primary {
            background: linear-gradient(145deg, #8a2be2, #4b0082);
            border-radius: 50px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(138,43,226,0.7); }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
        .label { color: rgba(255,255,255,0.8); font-weight: 500; margin-bottom: 0.5rem; display: block; }
    </style>
    <script>
        window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
</head>
<body class="relative">
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 py-8">
        <nav class="glass-card py-4 px-6 flex justify-between items-center mb-8">
            <span class="text-2xl font-light text-white">Psy<span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-pink-200">Quiz</span> <span class="text-sm text-white/50 ml-2">Admin</span></span>
            <div class="flex items-center space-x-3">
                <a href="/admin/questions" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 transition">Questions</a>
                <a href="/logout" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-red-500/20 hover:bg-red-500/30 transition">Déconnexion</a>
            </div>
        </nav>

        <div class="glass-card p-8">
            <h1 class="text-3xl font-bold text-white mb-6">{{ "Éditer" if question else "Ajouter" }} une question</h1>
            <div class="mb-6">
                <a href="/admin/questions" class="btn-secondary inline-flex items-center">← Retour</a>
            </div>
            {% if error %}
            <div class="bg-red-500/20 border border-red-500/50 text-red-100 p-4 rounded-xl mb-6 text-center">{{ error }}</div>
            {% endif %}
            <form method="post" class="space-y-6">
                <div>
                    <label class="label">Texte de la question</label>
                    <input type="text" name="text" required value="{{ question.text if question else '' }}" class="input-field">
                </div>
                <div>
                    <label class="label">Choix (format JSON)</label>
                    <textarea name="choices_json" rows="10" required class="input-field font-mono text-sm">{{ question.choices | tojson(indent=2) if question else '[{"text": "Exemple", "scores": [2,0,0,0,0,0,0,0,0,0]}]' }}</textarea>
                    <p class="text-sm text-gray-300 mt-2">Tableau de choix avec "text" et "scores" (liste de 10 entiers).</p>
                </div>
                {% if question %}
                <div>
                    <label class="label">Ordre</label>
                    <input type="number" name="order_index" value="{{ question.order_index }}" required class="input-field">
                </div>
                {% endif %}
                <div>
                    <button type="submit" class="btn-primary">{{ "Mettre à jour" if question else "Créer" }}</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

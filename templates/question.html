<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question {{ q_index+1 }} - Psy Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .floating-shape { position: absolute; background: rgba(255,255,255,0.03); border-radius: 50%; filter: blur(70px); z-index: 0; }
        .shape1 { width: 500px; height: 500px; top: -200px; right: -200px; background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, rgba(75,0,130,0.1) 100%); }
        .shape2 { width: 400px; height: 400px; bottom: -150px; left: -150px; background: radial-gradient(circle, rgba(0,191,255,0.2) 0%, rgba(0,0,139,0.1) 100%); }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
        }
        .progress-bar { background: rgba(255,255,255,0.2); border-radius: 9999px; height: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #8a2be2, #c084fc); height: 100%; border-radius: 9999px; }
        .choice-label {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .choice-label:hover { background: rgba(138,43,226,0.3); border-color: #8a2be2; transform: translateX(5px); }
        .choice-label input[type="radio"] { accent-color: #8a2be2; margin-right: 12px; transform: scale(1.2); }
        .nav-button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 10px 24px;
            color: white;
            transition: all 0.3s;
        }
        .nav-button:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
        .btn-primary {
            background: linear-gradient(145deg, #8a2be2, #4b0082);
            border-radius: 50px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(138,43,226,0.7); }
    </style>
    <script>
        window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
</head>
<body class="relative">
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <div class="relative z-10 max-w-3xl mx-auto px-4 py-8">
        <nav class="glass-card py-4 px-6 flex justify-between items-center mb-8">
            <span class="text-2xl font-light text-white">Psy<span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-pink-200">Quiz</span></span>
            <div class="flex items-center space-x-3">
                <span class="text-white/80 text-sm">Bienvenue, {{ username }}</span>
                <a href="/history" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 transition">Historique</a>
                {% if is_psychologist %}
                <a href="/admin/dashboard" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-green-500/20 hover:bg-green-500/30 transition">Admin</a>
                {% endif %}
                <a href="/logout" class="text-white/80 hover:text-white px-3 py-1 rounded-full bg-red-500/20 hover:bg-red-500/30 transition">Déconnexion</a>
            </div>
        </nav>

        <div class="glass-card p-8">
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm text-gray-200">Question {{ q_index+1 }} / {{ total }}</span>
                <div class="w-1/2 progress-bar">
                    <div class="progress-fill" style="width: {{ ((q_index+1)/total)*100 }}%"></div>
                </div>
            </div>
            <h2 class="text-2xl md:text-3xl font-semibold text-white mb-8">{{ question.text }}</h2>
            <form method="post" class="space-y-4">
                <div class="space-y-3">
                    {% for choice in question.choices %}
                    <label class="choice-label">
                        <input type="radio" name="answer" value="{{ loop.index0 }}" {% if selected == loop.index0 %}checked{% endif %} required>
                        <span>{{ choice.text }}</span>
                    </label>
                    {% endfor %}
                </div>
                <div class="flex justify-between pt-6">
                    {% if prev_index is not none %}
                    <button type="submit" name="action" value="prev" class="nav-button">← Précédent</button>
                    {% else %}
                    <div></div>
                    {% endif %}
                    <button type="submit" name="action" value="next" class="btn-primary">
                        {% if next_index is none %}Terminer{% else %}Suivant →{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

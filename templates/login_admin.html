<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion administrateur - Psy Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .floating-shape { position: absolute; background: rgba(255,255,255,0.05); border-radius: 50%; filter: blur(60px); z-index: 0; }
        .shape1 { width: 400px; height: 400px; top: -150px; left: -150px; background: radial-gradient(circle, rgba(138,43,226,0.3) 0%, rgba(75,0,130,0.2) 100%); }
        .shape2 { width: 350px; height: 350px; bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(0,191,255,0.2) 0%, rgba(0,0,139,0.1) 100%); }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
        }
        .input-field {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            width: 100%;
            outline: none;
        }
        .input-field:focus { border-color: #8a2be2; box-shadow: 0 0 0 3px rgba(138,43,226,0.3); }
        .btn-login {
            background: linear-gradient(145deg, #8a2be2, #4b0082);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(138,43,226,0.7); }
        .nav-link { color: rgba(255,255,255,0.8); }
        .nav-link:hover { color: white; }
    </style>
    <script>
        window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });
    </script>
</head>
<body class="relative">
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
        <div class="glass-card max-w-md w-full p-8">
            <div class="text-center mb-8">
                <div class="inline-block p-3 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-white">Espace professionnel</h2>
                <p class="text-gray-200 mt-2">Accès réservé aux psychologues</p>
            </div>
            {% if error %}
            <div class="bg-red-500/20 border border-red-500/50 text-red-100 p-4 rounded-xl mb-6 text-center">{{ error }}</div>
            {% endif %}
            <form action="/login-admin" method="post" class="space-y-6">
                <div>
                    <label class="block text-gray-200 text-sm font-medium mb-2">Nom d'utilisateur</label>
                    <input type="text" name="username" required placeholder="admin" class="input-field">
                </div>
                <div>
                    <label class="block text-gray-200 text-sm font-medium mb-2">Mot de passe</label>
                    <input type="password" name="password" required placeholder="••••••••" class="input-field">
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
            </form>
            <p class="text-center text-gray-400 text-xs mt-6">
                <a href="/" class="nav-link">← Retour à l'accueil</a>
            </p>
        </div>
    </div>
</body>
</html>
